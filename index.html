<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宵惊喜 · 予你星河圆满</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0d2e 0%, #1a1f4a 60%, #2c2f6e 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', '华文楷体', cursive, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 16px;
        }

        /* 月亮光晕 */
        .moon-glow {
            position: fixed;
            top: 5%;
            right: 8%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 240, 180, 0.4) 0%, rgba(255, 220, 140, 0.1) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(35px);
            z-index: 0;
            animation: floatGlow 6s infinite alternate ease-in-out;
        }

        /* 漂浮灯笼 (背景装饰) */
        .lantern-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .lantern-bg span {
            position: absolute;
            display: inline-block;
            width: 70px;
            height: 90px;
            background: rgba(230, 120, 80, 0.2);
            border-radius: 40% 40% 30% 30%;
            box-shadow: 0 0 30px rgba(255, 160, 100, 0.5);
            transform-origin: top center;
            animation: swing 8s infinite alternate;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 200, 150, 0.3);
        }

        .lantern-bg span::before {
            content: "🏮";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            opacity: 0.5;
        }

        .lantern-bg span:nth-child(1) { top: 10%; left: 5%; animation-duration: 12s; }
        .lantern-bg span:nth-child(2) { bottom: 15%; right: 3%; width: 60px; height: 80px; animation-duration: 10s; animation-delay: -2s; }
        .lantern-bg span:nth-child(3) { top: 40%; left: 90%; width: 50px; height: 70px; animation-duration: 14s; }
        .lantern-bg span:nth-child(4) { bottom: 30%; left: 15%; width: 80px; height: 100px; animation-duration: 9s; animation-delay: -4s; }

        /* 主卡片——惊喜核心 */
        .surprise-card {
            position: relative;
            z-index: 20;
            max-width: 650px;
            width: 100%;
            background: rgba(20, 18, 45, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 215, 150, 0.5);
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.6), 0 0 0 2px #fddba0 inset, 0 0 20px #ffb980;
            padding: 30px 20px 40px 20px;
            transition: transform 0.4s ease;
            animation: cardRise 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .surprise-card:hover {
            transform: scale(1.01);
        }

        /* 顶部灯笼装饰 */
        .lantern-top {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .lantern {
            position: relative;
            width: 90px;
            height: 120px;
            background: linear-gradient(145deg, #e3513c, #c53a1f);
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 0 4px #fbd26a, 0 0 30px #ffbb33;
            transform-origin: top center;
            animation: swingLight 3s infinite alternate;
            border-bottom: 6px solid #ffda88;
        }

        .lantern::before {
            content: "";
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 22px;
            background: #ab8e5a;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.4);
        }

        .lantern::after {
            content: "🏮";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.5));
        }

        .lantern .tassel {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 28px;
            background: #d6a155;
            border-radius: 2px;
        }

        .lantern .tassel::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: -6px;
            width: 16px;
            height: 16px;
            background: #daa44b;
            border-radius: 50%;
            box-shadow: 0 2px 5px #422b12;
        }

        .lantern.right {
            background: linear-gradient(145deg, #d1416e, #aa2b55);
            animation-delay: -1s;
        }

        /* 主标题 */
        .title-section {
            text-align: center;
            margin: 15px 0 10px;
            color: #ffecbf;
            text-shadow: 0 2px 10px #f90, 0 0 20px #ffb469;
        }

        .title-section h1 {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 8px;
            font-family: '华文楷体', 'KaiTi', cursive;
        }

        .title-section p {
            font-size: 1.3rem;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* 甜蜜谜面 / 祝福板 */
        .message-box {
            background: rgba(15, 10, 28, 0.6);
            border-radius: 60px 60px 40px 40px;
            padding: 26px 20px;
            margin: 25px 15px 20px 15px;
            border: 2px dashed #ffc489;
            box-shadow: 0 0 30px rgba(255, 190, 130, 0.3);
            backdrop-filter: blur(8px);
        }

        .greeting {
            font-size: 1.5rem;
            color: #ffe2b0;
            text-align: center;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 300;
            text-shadow: 0 2px 5px #b14200;
        }

        .greeting span {
            display: inline-block;
            background: rgba(255, 215, 140, 0.2);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 2rem;
            margin: 10px 0 6px;
            border: 1px solid #ffbc6e;
            box-shadow: 0 0 16px #ffa64b;
            color: #fff2d2;
            font-weight: 500;
        }

        .special-line {
            font-size: 2.2rem;
            margin: 16px 0 8px;
            color: #ffe39a;
            text-shadow: 0 0 30px #f90;
        }

        .love-note {
            background: rgba(255, 220, 170, 0.15);
            border-radius: 36px;
            padding: 20px 18px;
            margin: 15px 0 5px;
            border-left: 6px solid #ffad66;
            border-right: 6px solid #ffad66;
            font-size: 1.4rem;
            color: #ffddb0;
            text-align: center;
            font-style: italic;
        }

        .love-note strong {
            color: #ffd78a;
            font-size: 1.7rem;
            display: block;
            margin-top: 10px;
            font-style: normal;
            letter-spacing: 1px;
        }

        /* 按钮 + 互动区 */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0 15px;
        }

        .reveal-btn {
            background: linear-gradient(145deg, #f4ac5e, #d27d36);
            border: none;
            border-bottom: 6px solid #9e551d;
            font-size: 2rem;
            padding: 18px 50px;
            border-radius: 60px;
            color: #1f0f01;
            font-weight: bold;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 10px 0 #754421, 0 20px 30px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            font-family: '华文楷体', 'KaiTi', cursive;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .reveal-btn:active {
            transform: translateY(8px);
            box-shadow: 0 5px 0 #754421, 0 20px 30px rgba(0,0,0,0.5);
        }

        .secret-message {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1), padding 0.6s ease, opacity 0.5s ease;
            border-radius: 60px;
            opacity: 0;
            border: 1px solid transparent;
            width: 100%;
        }

        .secret-message.show {
            max-height: 300px;
            padding: 25px 20px;
            opacity: 1;
            border-color: #fec982;
            box-shadow: 0 0 40px #ffb05b;
            background: rgba(40, 20, 50, 0.7);
        }

        .secret-content {
            font-size: 1.9rem;
            color: #fff5cf;
            text-align: center;
            line-height: 1.4;
        }

        .secret-content small {
            font-size: 1.2rem;
            color: #eac194;
            display: block;
            margin-top: 12px;
        }

        /* 浮动元宵 */
        .riceball {
            display: inline-block;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 6px 4px #442211);
        }

        /* 动画 */
        @keyframes swingLight {
            0% { transform: rotate(3deg); }
            100% { transform: rotate(-3deg); }
        }

        @keyframes swing {
            0% { transform: rotate(4deg) translateY(-4px); }
            100% { transform: rotate(-6deg) translateY(8px); }
        }

        @keyframes floatGlow {
            0% { opacity: 0.5; transform: translate(0, 0); }
            100% { opacity: 0.9; transform: translate(-20px, -15px); }
        }

        @keyframes cardRise {
            0% { opacity: 0; transform: translateY(80px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 落款 */
        .footer {
            text-align: center;
            color: #c9a77b;
            margin-top: 20px;
            font-size: 1.1rem;
            text-shadow: 0 2px 4px black;
        }

        .footer span {
            color: #ffbc7a;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <!-- 背景光晕 -->
    <div class="moon-glow"></div>

    <!-- 背景飘浮灯笼 -->
    <div class="lantern-bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- 主惊喜卡片 -->
    <div class="surprise-card">
        <!-- 顶部一对主灯笼 -->
        <div class="lantern-top">
            <div class="lantern left">
                <div class="tassel"></div>
            </div>
            <div class="lantern right">
                <div class="tassel"></div>
            </div>
        </div>

        <!-- 标题 -->
        <div class="title-section">
            <h1>元宵·圆满</h1>
            <p>🏮 献给最爱的你 🏮</p>
        </div>

        <!-- 祝福语区域 (固定甜蜜) -->
        <div class="message-box">
            <div class="greeting">
                月圆人圆 · 事事皆圆<br>
                <span>❤️ 你是我的小元宵 ❤️</span>
            </div>

            <!-- 温馨留言 -->
            <div class="love-note">
                “ 所有关于元宵的浪漫<br>
                　　都不及此刻有你<br>
                　　软糯香甜，余生共品 ”
                <strong>—— 你的专属 boy</strong>
            </div>

            <!-- 互动按钮 · 惊喜揭晓 -->
            <div class="action-area">
                <button class="reveal-btn" id="surpriseBtn">
                    <span class="riceball">🍡</span> 点我猜灯谜 <span class="riceball">🍡</span>
                </button>

                <!-- 隐藏的惊喜内容 (动态出现) -->
                <div class="secret-message" id="secretMessage">
                    <div class="secret-content">
                        🏮 <strong>谜底：就是你呀，我的婷宝</strong> 🏮<br>
                        ｜ 最爱的人 ｜<br>
                        <small>往后每一个元宵，都要一起过。</small>
                        <div style="font-size:2.5rem; margin-top:6px;">❤️</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 落款与日期 (元宵氛围) -->
        <div class="footer">
            <span>🥣</span> 乙巳年 · 元宵佳节 · 花灯如昼 <span>🥣</span><br>
            只愿 · 年年有你 · 岁岁平安
        </div>
    </div>

    <script>
        (function() {
            // 让惊喜更温暖：打开页面后稍微延迟一点加载额外元素，但主要是按钮交互
            const btn = document.getElementById('surpriseBtn');
            const secretDiv = document.getElementById('secretMessage');

            // 点击按钮显示秘密信息，并且让按钮有点“被猜中”的快乐反应
            btn.addEventListener('click', function() {
                // 切换显示
                secretDiv.classList.toggle('show');

                // 如果显示了秘密，可以更新按钮文字为“谜底已开”，也可以不更新（保留趣味）
                if (secretDiv.classList.contains('show')) {
                    btn.innerHTML = '<span class="riceball">🏮</span> 谜底：你呀 <span class="riceball">🏮</span>';
                    // 额外小惊喜：放一个小烟花似的（改个按钮颜色）
                    btn.style.background = 'linear-gradient(145deg, #f7ca7c, #e89f4a)';
                    btn.style.borderBottomColor = '#b46327';

                    // 弹出式的语音（没有声音，但视觉开心）
                    const extraLove = document.createElement('div');
                    // 不需要追加，只是让卡片微微震动一下以示庆祝
                    document.querySelector('.surprise-card').style.animation = 'none';
                    setTimeout(() => {
                        document.querySelector('.surprise-card').style.transform = 'scale(1.02)';
                    }, 10);
                    setTimeout(() => {
                        document.querySelector('.surprise-card').style.transform = 'scale(1)';
                    }, 150);
                } else {
                    // 如果关闭了秘密，恢复原来的按钮字
                    btn.innerHTML = '<span class="riceball">🍡</span> 点我猜灯谜 <span class="riceball">🍡</span>';
                    btn.style.background = 'linear-gradient(145deg, #f4ac5e, #d27d36)';
                    btn.style.borderBottomColor = '#9e551d';
                }
            });

            // 再埋一个无声的甜蜜：页面加载完毕, 控制台打印小情话（可忽略）
            console.log('%c✨ 元宵快乐，我的世界因为有你才圆满 ✨', 'color: #ffbc7a; font-size: 16px; font-style: italic;');

            // 额外惊喜: 点击任何地方出现小标记? 不，保持简洁，但背景灯笼偷偷加一个动画。
            // 以及随机让某颗星星亮起——就靠css了。
        })();
    </script>

    <!-- 为了更精致，加一个小元宵浮动装饰 (绝对定位无妨) -->
    <div style="position: fixed; bottom: 15px; left: 15px; font-size: 45px; opacity: 0.4; z-index: 5; transform: rotate(-10deg);">🏮</div>
    <div style="position: fixed; top: 20px; left: 20px; font-size: 40px; opacity: 0.25; z-index: 5; animation: bounce 5s infinite;">🍡</div>
</body>
</html>
